<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Eduarda eres muy tiernita ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}


body{

    height:100vh;
    background:radial-gradient(circle,#7b2cbf,#000);
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;

}


/* estrellas */

body::before{

    content:"";
    position:absolute;
    width:100%;
    height:100%;

    background-image:
    radial-gradient(white 1px, transparent 1px);

    background-size:45px 45px;

    animation:estrellas 5s infinite;

}


@keyframes estrellas{

    50%{
        opacity:.5;
    }

}



/* planeta de texto */

.planeta{

    width:430px;
    height:430px;

    position:absolute;

    animation:girar 12s linear infinite;

}



.texto{

    width:430px;

    text-align:center;

    font-size:24px;

    text-shadow:0 0 15px pink;

}



@keyframes girar{


from{

transform:rotate(0deg);

}


to{

transform:rotate(360deg);

}

}



/* corazon */

.corazon{

    font-size:140px;

    z-index:2;

    animation:

    latido 1s infinite;

    filter:drop-shadow(0 0 20px red);

}



@keyframes latido{


50%{

transform:scale(1.25);

}


}



/* mensaje */

.mensaje{

    position:absolute;

    top:70px;

    font-size:25px;

    text-align:center;

}



/* musica */

audio{

    position:absolute;

    bottom:30px;

    width:300px;

}


</style>

</head>


<body>


<div class="mensaje">

Para Eduarda ❤️

</div>



<div class="planeta">

<div class="texto">

❤️ Eduarda tiernita ❤️ Bonita ❤️ Siempre tú ❤️ Te quiero ❤️

</div>

</div>



<div class="corazon">

❤️

</div>



<audio controls loop>


<source src="https://raw.githubusercontent.com/JuAno777-Ux/hmmm/main/cancion.mp3" type="audio/mpeg">


</audio>



</body>

</html>
