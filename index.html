<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Eduarda eres muy tiernita ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}


body{

    height:100vh;
    background:radial-gradient(circle,#5b1a7a,#000);
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;

}


/* estrellas */

body::before{

    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background-image:radial-gradient(white 1px,transparent 1px);
    background-size:40px 40px;
    opacity:.5;

}


/* texto girando */

.planeta{

    width:450px;
    height:450px;
    position:absolute;
    animation:girar 12s linear infinite;

}


.texto{

    width:450px;
    text-align:center;
    font-size:24px;
    letter-spacing:3px;

}



@keyframes girar{

    from{
        transform:rotate(0deg);
    }

    to{
        transform:rotate(360deg);
    }

}



/* corazon */

.corazon{

    font-size:130px;
    animation:latir 1s infinite;
    z-index:2;

}


@keyframes latir{

    50%{
        transform:scale(1.25);
    }

}



/* musica */

audio{

    position:absolute;
    bottom:30px;

}


</style>

</head>


<body>


<div class="planeta">

<div class="texto">

❤️ uwu ❤️ Eduarda tiernita ❤️ Bonita ❤️ Siempre tú ❤️

</div>

</div>


<div class="corazon">

❤️

</div>



<audio controls loop>

<source src="https://juano777-ux.github.io/hmmm/cancion.mp3" type="audio/mpeg">

</audio>



</body>

</html>
